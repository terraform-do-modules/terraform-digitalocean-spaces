name: tf-checks
on:
  push:
    branches: [ master ]
  pull_request:
  workflow_dispatch:
jobs:
  basic-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@9db6ce0e27e44d60dfb166a04f7ecddde842ec4f # pinned to latest
    with:
      provider: digitalocean
      working_directory: './_examples/basic/'
  complete-example:
    uses: clouddrove/github-shared-workflows/.github/workflows/stf-checks.yml@9db6ce0e27e44d60dfb166a04f7ecddde842ec4f # pinned to latest
    with:
      provider: digitalocean
      working_directory: './_examples/complete/'

# Separate job for TFlint workflow call
  tf-lint:
    uses: clouddrove/github-shared-workflows/.github/workflows/tf-lint.yml@1a77be93ccd008d6384fc78fb3d567c50cd963fd # pinned to latest
    secrets:
      GITHUB: ${{ secrets.GITHUB }}
